front:
  text: 體玄眞人顯異録惟二
  hash: sha256:50aafc96fc9c801659bc1dfbefbdeb40112ace062af75e37f445771385d2e706
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0299_HFL_000-001a, image: hfl/0329/0329-044.png}
body:
  text: 木神作崇莱陽東南白坡荘有王進之妻董氏患急弓風屢召名醫治之弗效經其半載忽聞有王先生號體玄眞人到白坡菴進乘馬引僕請師不允進還與親復議曰若王先生不來救之則董氏之命在於朝夕矣其父子二人再同歩詣菴彌加懇請師乃許遂至彼居視患人曰我將謂何病指雕木佛前神子云誰知此箇火頭作祟令進等焼却良久董氏訝而笑白妾病若遺也一家欣然拜謝師欲出衆爲之曵衣勉留齋畢乃去瓦獸爲災孫富福山縣南塔子莊人也家資稍盛酤醖理生性賦強梁語多侮狎不居禮節里人謂之癡三郎也常從師遊戯山林以爲歌酒之友富一日忽患血痢淹延月餘藥食無功疼痛弗忍切切然自訟曰先生胡不來救我邪語未已師從門外呼之曰家中有孫癡三否子欽岀而迎曰大人病將極矣師曰不妨欽欣然引至病榻師髙呼癡三我特來與你飲酒何得不起邪富曰我病將死矣水米不加安能飲乎師曰我敢保你不死遂出門四方瞻顧指東廂屋獸頭云元是這業畜爲災即時令人擊碎復内問富曰起得否答曰痛則止矣奈無力不能起也師令富妻梁氏速烹饘粥須臾報粥熟矣師即臨釜呴之然後親哺之富乃連食數器揚言甘美無味比諸師復語梁氏有美醖速取一罇師自飲至半餘者與富飲之沉疾頓愈即端衣正履起而拜謝曰深䝉師父慈憫救之復活下情無以慰念願爲弟子出家修行師曰夫出家盡終者皆宿縁所致非偶然而能爲也觀汝之宿賦於岀家則未然當在家作福可也未幾師潜去之富乃徧檢里人所負財賦契券文曆悉焚之矣熟食遍衆師昔遊萊陽東倪家莊河東名曰呼石崖有新剏小菴一所門人王志堅等居之時方纔過新正志堅私議於衆曰此菴初立信奉者幾家耳賴師眞降臨即罄其所有作上元醮可乎衆曰諾經之營之醮乃成焉至十六日告畢師語衆曰諸岀家在家不可散去明日齋畢則散衆於是無敢辭者良久志堅入覆云弟子數訖衆人已七十有餘據所剰餅物不滿栲栲恐難及之師躬詣其處將栲栲中物注在一空瓮内岀曰及得及得次日臨齋志堅復稟各幾枚曰四枚依之齋畢師曰據遠來者更各與二枚以充路費散遍並無一少剰者也志堅悉告於衆衆乃焚香再拜讃言竒異從此化數十莊奉善生麵充齋師昔乞食嘗到東牟溝頭村其于深見師問之曰先生將齋乎師曰然即請坐内語其妻曰當造餺飥與先生齋方溲麺成劑忽有人從門外請師曰今李官人命友洪飮待先生久矣師聞之語深曰將麺來答曰未熟師曰但取來不妨深意謂持去就李宅熟之遂進生劑師乃接而食之稍無難色深駭然而諫曰然先生鼎有丹砂鑪存眞火亦詎能當之哉師微哂不答食盡乃去後略不傷和所祈即應師應縁北邁到薊州遵化縣時北京大旱按察使久佩師㫖訓名尊道及屡嘗禱師有應是時復知在於遵化即選差在京奉道商四官人齎書邀請師聞之不能辭避應命而徃於七月十四日到北京使與諸官及應係乞雨數千人叅拜畢使親爲祇待翌日清旦使復率衆師前焚香致禱曰此方旱及五旬苗將槁矣願垂慈造俯慰群情幸甚幸甚師曰用得一尺水否衆相顧而無言十七日果雨地方千里皆及一尺官民僉議作謝雨醮復罷師將離京傾城相餞使曰此别之後再會未可期也師即云都下使歸而思忖到任未及兩月何有都下之期師於中秋届都城太虚觀不数日使任太子詹事果會於此師欲南遷詹事贈别云無計久駐芝軿山水漸遥後會在何處也師曰寜海詹事黙然詳度或不測有寧海往復之幹若任於彼則何其降邪後果任寧海凡會先知師還郷繼北邊有事詹事被差到彼不功遂謫爲寧海守纔赴任乃躬詣聖水叅師焚香致懇曰尊道若於往昔神仙達士但聞其名耳自拜師之後凡伸祈禱必垂嘉應將成會遇示以預知深愧塵凡承兹大幸幾欲去蝸蠅之累從雲水之遊奈事與願違徒加悵然也出神飲酒師被召過滄州有皇親四官人請向自己道菴内駐止翌日輙有酒使劉公請師曰敢屈法身暫臨弊止萬幸師從之詣彼廨宇以至於齋畢復啓曰久知先生飮酒不醉恨無縁見之今道徳聞上幸獲叅承敢祈暢飮一醉願之足矣師曰過䝉厚意公之美醖想非村醪之可比也縁食之太飽必不能任略容少憩當成大飲公諾而退徐聞之師在廳上鼻息如雷公乃同妻趙氏欲入酒庫以備師之所飮忽見師在庫中凭瓮操瓢連飲之二人潜身退歩復觀廳上見師依前熟寐再窺庫中見師正飲一瓮旣盡次瓮又將盡矣夫婦驚訝惶恐走至廳上不待香而拜之師覺曰荷公見召已飲訖二瓮予何以酬之遂令侍者取一舊汗衫贈公云物雖輕而價復高矣凡人有疾覆之可愈師㝷赴闕四方有病者聞之來如輻湊効如谷響彼夫婦瞥然猛省曰信哉善縁可結道力堪憑遂將財寳散之貧乏奴僕放以從良二人分頭出家俱在道而終焉忘形奕棊師昔於福山縣南水都村乞食有富者王祐見之曰先生肯共我奕棊否師曰依髙命時方暮冬極寒祐乃狐帽綿裘皮靴氊韈見師單衣露肘弊鞋岀指故謔之引於前廳命師當門迎風而坐祐即坐其傍復戲曰當圍幾局師曰三局可矣祐曰太少師曰十局可否祐允之次第而下局未及終祐已覺寒勉至於再局祐爲之呵手振足將不可忍觀於師則乃見神容恱澤煦煦然如春也祐竟不能待之於三乃釋局而起復曰先生實爲無心無念忘形忘體者也師微笑而嘆曰俗謔俗謔違盟負約言訖乃去專知嗣續初專知即福山石塚人也世本豪族稔欽師望年將耳順嗣續未焉忽一日師於庭前地坐以足舉碓臼人問其故師曰專知無嗣蓋此臼置之不當也我今送二子與之當移此臼免爲後患衆皆笑以爲狂言師乃儼然不顧足舉臼移舞袖而出後果生二子長曰興住次曰乞得衆方純信抱陽身安髙榮與初氏同里世爲醫藥宿禀仁慈父崇師道訓名抱陽一日忽患痢疾仙方神藥弗之能治迨將月餘湯飲不下疼痛莫禁咸云休息無法可痊復一日師從東牟至里南樓子莊語其徒鄧道通曰我將謂髙抱陽病已死矣今知存在同往救之北過陽主神廟遂折荆枝一莖望廟撝斥竚立久之徑往髙氏本居索小刀一刄入病室見病者曰我來救汝遂以布袍袖從頭拂拭以至於踵復以刀尖力剌牀席叱病者起坐即應聲而起疼痛若遺語言如故令家人急烹稠粥家人曰水尚難飲而況稠粥乎師曰不妨少頃粥至師親授病者病者始則意難及乎少進即連食二器唱言美哉即離席起謝安徤勝常雨龍忽起師在薊州作醮畢有玉田縣官員及諸奉道請至本邑玉清觀住夏繼五月旱作初十日官民禱師祈雨允之翌日雨降約二寸復不逺官民心未愜而面謝之師曰衆謝之非也豈是貧子所禱之雨至十三日侵晨師於聖前焚香畢指示衆曰見否衆隨指南望見黑煙一縷從井而昇師曰此是雨龍取水已起不久當澍果於辰時雨降抵暮方息逺近霑足遂使官民慶恱苗稼滋榮成一方之大稔烹雞復還師昔年嘗至萊陽東馬曹莊有姜侁者頗聞師能療疾病敵寒暑恨不得而見之是日請至本居啓曰侁願奉先生飽齋當造何物可邪師曰有雞否答曰侁家毎畜𧳯羊至於雞則未甞畜也邇有親者遺一雞稱能鳴留之司晨耳師曰肯與我食乎侁諾而出捕之適有本莊李壽卿見之諫於侁曰夫世之君子猶不忍見死不忍食肉況爲道者乎詳公之敬其先生者近於謬也侁曰嘗聞人設餚置酒不能致先生一到門者在在有之今幸不我外豈可恡此物邪遂殺而烹之旣熟饋於師刀食之俱盡捫腹作噫樂然而去翌旦侁等忽聞雞唱衆疑曰復有何雞來此架邪聲與所烹者相類及明視之形色亦與前雞一同驗其昨日所撏翎羽復一一存之侁乃心情無託顚倒若醉往告壽卿壽卿聞之乃戄然曰昨視之先生以爲常倫今詳是理當爲得道者乎侁曰雖云聞說先生療疾病敵寒暑心未至於純信也復未審得道者悉能爲於是乎壽卿曰惜公之不知書也僕稍曾渉獵仙經道傳知夫得道者可以陶冶二儀埏埴九土出神入夢透金貫石變化飛勝無所不至况此一雞者乎侁省而賀曰先生之道乃天也予刀醯雞也公爲我啓其覆方知天之髙矣逺矣豈容淺淺之見測其涯涘者哉王公落馬福山南水都村王忠一日請師本家共飮將至半酣輙有南莊客戸李旺喚忠詣彼分田忠令鞲馬徐報鞁訖其妻復催之師語忠曰勿去去則可惜死却爾其妻作愠而言曰先生戀飲不顧妨人之幹安用復以卒亡之事特相誑邪師拂袖而起曰不信則從汝北行將至五里忽聞後有人走馬追及視之乃伊壻栁春也愴惶而告曰妻父落馬死矣禱先生往救之拜不自休師許同廻至彼見忠死卧於道衆圍而哭之師止以勿哭令取水一椀環而灑之三帀水盡師曰不能救得衆再三哀告師復令取水一椀布氣念呪以水噀灑又至於三帀師叱曰王忠爾擡左手即應聲而舉右手亦然復令開眼見衆云爾等何爲其妻問曰不覺邪徐答云只記得到此忽然迷悶隨數人西去約行及二十里驀聞王先生追喚迴來復至一溝旣深且闊不能過得賴王先生以手提之乃過耳衆指云先生在此忠乃起而禮謝曰不信玄言遂招此厄儻非救抜已爲鬼録矣其妻大恥彌加敬服李婦食狗師到濟南府臨邑縣有在城焦潤玉李遇風等十上戸修黃籙大醮分諸局次晝夜營備毎日四方善衆來如雲集將作醮之日侵晨有數醮首詣靜位伺之師乃覺衆託侍者覆云有在城李家新婦於殿前卒死願慈悲救之師曰何不早道乃頭不及簮披衣趿履至於戍生人元辰前取氣一口吹於死者頂門中仍以袖拂之其人即穌師迴靜位衆禮謝畢師曰此人爲食狗肉觸犯醮筵元辰譴責正追付東嶽我與救迴良久其人方省告於衆曰爲我不信王大師故食狗肉來此看有何驗今被譴至黑暗中賴眞人光明救迴衆不可不信也痼疾獲痊師在北京華陽觀有按察副使嘉議大夫素以刑政酷虐世號爲半截劔事親頗孝因母染患數載千方弗驗毎於公退輙承顔問疾恨無計而代之有吏報云邇在京凡有病者告王大師餘食食之立愈使聞之未及純信然孝誠所使不可不爲也遂往拜師乞餘食師乃授之迴饋於母食之沉疾陡痊翌日請師本廳朝服設拜捻香跪啓曰僕之好善始於幼歳自及第爲官恐妨王事固不冝使人知也比年屢任斯職至於關西山東河南海北靡不遍經嘗訪以釋門據所親見皆泛泛之徒無可師者今幸遇眞人乞垂法訓永奉宗師結出世之因縁也師訓名清質號開眞子稽首拜謝畢齋供茶果留連抵暮送師還觀冤魂乞救翌日副使烏林答清質紏集京城善衆議修黃籙醮衆欣然而諾遂就華陽觀夙夜營備洎附醮之家各搭蓋靈位向畢叩醮三二日忽於靈位前有一人暴死復起行走張荒趂一婦人意欲扯拽似有所訴之事衆爲之隔住著言門難乃曰羞恥難言衆曰爾若不言人何以知徐曰我於年前都下當報事滿九月九日迴到本家被妻於麵内藏毒將我謀殺嫁其所往之人今知南方得道眞人在此作大醮我欲扯拽告眞人乞垂救抜我並無親族又無知者百無𠋣託恐墮幽冥何時得免若眞人一去不得遇也言訖放聲痛哭觀者愴然輙有隨師瑞州海陽縣奉道張二官人緩止其哭語云爾旣如斯明白已開具在醮也此間醮罷我即請眞人於海陽作醮再與爾追薦即應謝而去其人復還如舊精邪去宅師到平州昌黎縣髙眞觀在城有前縣尉賦性剛劣素不信善忽淹重疾俯仰踰年夜夢顚倒心常驚悸親戚奴僕似此者衆復有鬼怪相撓以妨飲食遂成羸弱不復起也以至巫羞醫倦弗獲痊瘥聞師在觀令人擡詣師前師叱去扶人乃疑而未捨再怒叱方捨而退病者悉能獨立師令近前又能行歩似瘳半矣師以自食餘物授之亦乃食盡良久輕徤若無病之時也師爲呪水一瓶書符一道教其用度禮謝而歸依命貼符於堂中即時鬼怪現形至甚醜惡家人皆見用水灑之乃驚走入一坑中復於坑中灑之遂逼出大小六鬼擔抱提携而去再而灑之離宅漸逺以至形影消滅矣從此宅静人安翌日挈家詣師焚香拜謝曰一生性僻剛劣不仁豈知道門有如此竒事邪遂大施錢財修建髙眞觀化在城二百餘家尊崇道教鸞鶴集壇瑞州海陽縣奉道張二官人請師至彼獨修下元黃籙大醮其中破用非止一端但忻然營備略無倦怠師預示衆曰此醮非常必垂嘉兆十三日申時發牒之次有鸞四隻鶴二十隻翔於空中良久西南而去十四日中朝行道師曰有報應日中則天師降現徐行道至午忽見雙鸞引群鶴翔於壇上及以五色彩霞光射衆目有人不信是鶴者數隻爲之低飛回翔側示朱頂衆皆異之逡廵一鶴翩翩而落於壇前驅之即狎毎日以食飼之但仰天而唳終不飛去待師於二十日將起程西邁焚香辭聖畢鶴乃迎師大唳數聲振羽而翥空中盤繞三帀望西南而去矣即有滿城信士賀郎中等寫爲圖而敬之不已太上雲端師自北方迴至徳州重興鎭有前滄州節使光禄修黃籙大醮四晝夜乃潔己䖍心依式咸備將行醮事師曰夫官髙三品亦人間之極貴也復欽奉玄科慇懃不怠乃感諸天懽樂當有非常之兆至第四日夜設醮之際衆忽見太上老君乗五色明霞見於壇上方奏青詞師乃俯伏衆又見童子僅及尺餘容貌竒絶衣服特異從師手鑪内起詣太上前如有禀覆之事焚詞畢方隠不復見矣光禄即令晝工寫其事跡衆各傳寫之凡所見聞皆歎古今罕遇也體玄眞人顯異録
